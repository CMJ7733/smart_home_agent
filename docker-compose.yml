version: "3.9"

services:
  # ==== Phase 0/1/2: Redis 短期记忆 ====
  redis:
    image: redis:7-alpine
    container_name: smart_home_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

